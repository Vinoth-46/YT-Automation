version: '3.8'

services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  bot:
    build: .
    depends_on:
      - mongodb
    env_file:
      - .env
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
    volumes:
      - ./outputs:/app/outputs
      - ./assets:/app/assets
      - ./credentials:/app/credentials

volumes:
  mongo_data:
