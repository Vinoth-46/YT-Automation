version: '3.8'

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: yt_automation
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  bot:
    build: .
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - POSTGRES_URL=postgresql+asyncpg://user:password@db/yt_automation
    volumes:
      - ./outputs:/app/outputs
      - ./assets:/app/assets
      - ./credentials:/app/credentials
      - ./temp:/app/temp

volumes:
  postgres_data:
